<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chipmunk Neon (Stable)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    colors: { 
                        chipmunk: { light: '#f97316', DEFAULT: '#ff5500', dark: '#cc4400' },
                        neon: { cyan: '#00f3ff', purple: '#9d00ff', pink: '#ff00aa' }
                    } 
                } 
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap');

        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Nunito', sans-serif; background-color: #050505; color: #fff; }

        .animated-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0;
            background: linear-gradient(45deg, #0f0c29, #302b63, #240b36, #4a00e0, #8e2de2, #ff512f, #dd2476);
            background-size: 400% 400%; animation: gradientBG 20s ease infinite;
        }
        @keyframes gradientBG { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }

        .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.5; animation: floatOrb 10s infinite alternate ease-in-out; pointer-events: none; }
        .orb-1 { width: 300px; height: 300px; background: #ff00aa; top: -50px; left: -50px; animation-delay: 0s; }
        .orb-2 { width: 400px; height: 400px; background: #00f3ff; bottom: -100px; right: -100px; animation-delay: -3s; }
        .orb-3 { width: 250px; height: 250px; background: #ff5500; top: 40%; left: 40%; animation-delay: -7s; }
        @keyframes floatOrb { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.2); } }

        .glass-panel { background: rgba(15, 15, 20, 0.5); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5); }
        .glass-input { background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.15); color: white; transition: all 0.3s ease; }
        .glass-input:focus { border-color: #ff5500; background: rgba(0, 0, 0, 0.8); outline: none; }

        .msg-me { background: linear-gradient(135deg, #ff512f, #dd2476); color: white; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(221, 36, 118, 0.3); }
        .msg-them { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); color: white; border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }

        .avatar-img { object-fit: cover; width: 100%; height: 100%; border-radius: 50%; }
        
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.95) translateY(10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        .animate-pop { animation: popIn 0.3s ease forwards; }

        #local-video { transform: scaleX(-1); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #ff5500; border-radius: 10px; }
        .ui-layer { position: relative; z-index: 10; }
    </style>
</head>
<body class="h-[100dvh] flex flex-col">

    <!-- ЖИВОЙ ФОН И ОПТИМИЗИРОВАННАЯ АНИМАЦИЯ CANVAS -->
    <div class="animated-bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <canvas id="epic-battle-canvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.8; pointer-events: none;"></canvas>

    <!-- УВЕДОМЛЕНИЯ -->
    <div id="toast" class="ui-layer fixed top-6 left-1/2 transform -translate-x-1/2 bg-white/10 backdrop-blur-xl border border-white/20 text-white px-6 py-3 rounded-full shadow-2xl z-50 transition-all duration-300 opacity-0 translate-y-[-20px] pointer-events-none flex items-center font-bold">
        <i id="toast-icon" class="fas fa-bell mr-3 text-neon-cyan"></i>
        <span id="toast-msg" class="text-sm tracking-wide"></span>
    </div>

    <!-- АВТОРИЗАЦИЯ -->
    <div id="screen-auth" class="ui-layer absolute inset-0 flex flex-col items-center justify-center p-4 z-40 bg-black/60 backdrop-blur-md">
        <div class="w-full max-w-sm space-y-8 text-center animate-pop glass-panel p-8 sm:p-10 rounded-[2.5rem]">
            <div class="w-32 h-32 bg-black rounded-full flex items-center justify-center mx-auto text-7xl border-[3px] border-orange-500 shadow-[0_0_20px_#ff5500]">🐿️</div>
            
            <div>
                <h1 class="text-4xl font-black text-white tracking-tight mb-2">CHIPMUNK</h1>
                <p class="text-stone-400 text-xs font-bold tracking-widest uppercase">Secure P2P Connect</p>
            </div>
            
            <form class="space-y-5" onsubmit="loginUser(event)">
                <div class="text-left relative">
                    <i class="fas fa-user absolute left-5 top-1/2 transform -translate-y-1/2 text-stone-400"></i>
                    <input type="text" id="auth-username" required placeholder="Ваш Никнейм..." class="w-full glass-input rounded-2xl pl-12 pr-5 py-4 text-lg font-bold placeholder-stone-500">
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-orange-500 to-pink-600 text-white font-black py-4 rounded-2xl transition hover:scale-105 active:scale-95 text-lg uppercase tracking-wider">
                    Ворваться в сеть <i class="fas fa-rocket ml-2"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- ГЛАВНЫЙ ИНТЕРФЕЙС -->
    <div id="screen-app" class="ui-layer hidden flex-1 flex flex-col h-full bg-transparent">
        
        <header class="glass-panel p-3 sm:p-4 flex justify-between items-center z-20 flex-shrink-0 rounded-b-3xl mx-2 mt-2">
            <div class="flex items-center space-x-4">
                <div class="relative cursor-pointer transition transform active:scale-90" onclick="openSettings()">
                    <div id="my-avatar-display" class="relative w-14 h-14 bg-stone-800 rounded-full flex items-center justify-center text-3xl overflow-hidden border-2 border-neon-cyan">🐿️</div>
                </div>
                <div class="overflow-hidden">
                    <h1 id="my-name-display" class="text-xl font-black text-white truncate tracking-wide">Имя</h1>
                    <p id="connection-status" class="text-xs text-yellow-400 flex items-center font-bold tracking-widest uppercase mt-1">
                        <span class="w-2 h-2 rounded-full bg-yellow-400 mr-2 animate-pulse"></span> Подключение...
                    </p>
                </div>
            </div>
            <button onclick="openSettings()" class="w-12 h-12 rounded-full glass-input flex items-center justify-center transition text-xl active:scale-90"><i class="fas fa-sliders-h"></i></button>
        </header>

        <main class="flex-1 relative flex overflow-hidden p-2">
            
            <div id="view-contacts" class="absolute inset-0 flex flex-col p-2 overflow-y-auto w-full max-w-md mx-auto animate-pop z-10">
                
                <!-- БЛОК С 6-ЗНАЧНЫМ КОДОМ -->
                <div class="glass-panel rounded-3xl p-6 mb-4 relative overflow-hidden group">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-neon-purple rounded-full filter blur-[50px] opacity-20 group-hover:opacity-40 transition"></div>
                    <h2 class="text-xs font-black mb-3 text-stone-400 uppercase tracking-widest"><i class="fas fa-fingerprint mr-2 text-neon-cyan"></i>Твой 6-значный код</h2>
                    <div class="flex items-center space-x-3 relative z-10">
                        <input type="text" id="my-id" readonly value="Генерация..." class="flex-1 glass-input rounded-2xl px-5 py-4 font-mono text-2xl text-center w-full transition text-neon-cyan font-bold tracking-[0.3em]">
                        <button onclick="copyId()" class="bg-white/10 hover:bg-white/20 border border-white/10 text-white p-4 rounded-2xl active:scale-90 transition text-xl"><i class="fas fa-clone"></i></button>
                    </div>
                </div>

                <div class="glass-panel rounded-3xl p-6 mb-4 relative overflow-hidden group">
                    <div class="absolute top-0 left-0 w-32 h-32 bg-orange-500 rounded-full filter blur-[50px] opacity-20 group-hover:opacity-40 transition"></div>
                    <h2 class="text-xs font-black mb-4 text-stone-400 uppercase tracking-widest"><i class="fas fa-radar mr-2 text-orange-500"></i>Радар (Поиск)</h2>
                    <div class="space-y-3 relative z-10">
                        <input type="text" id="new-friend-id" placeholder="Введи 6 цифр друга..." class="w-full glass-input rounded-2xl px-5 py-4 font-mono text-lg text-center tracking-widest transition">
                        <button onclick="addFriendManual()" class="w-full bg-gradient-to-r from-neon-purple to-blue-600 text-white font-bold py-4 rounded-2xl transition text-sm flex items-center justify-center hover:scale-[1.02] active:scale-95 shadow-lg uppercase tracking-wider">
                            Установить связь <i class="fas fa-bolt ml-2"></i>
                        </button>
                    </div>
                </div>

                <div class="flex-1 glass-panel rounded-3xl p-6 overflow-y-auto">
                    <h2 class="text-xs font-black mb-4 text-stone-400 uppercase tracking-widest"><i class="fas fa-users mr-2 text-pink-500"></i>Связи</h2>
                    <div id="friends-list" class="space-y-3"></div>
                </div>
            </div>

            <div id="view-chat" class="hidden absolute inset-0 flex flex-col z-20 w-full animate-pop px-2 pb-2">
                <div class="glass-panel rounded-t-[2rem] p-3 sm:p-4 flex justify-between items-center z-30 mb-2 mt-2">
                    <div class="flex items-center">
                        <button onclick="closeChat()" class="mr-4 w-12 h-12 rounded-full glass-input flex items-center justify-center active:scale-90 text-xl"><i class="fas fa-chevron-left"></i></button>
                        <div id="chat-header-avatar" class="w-12 h-12 bg-stone-800 rounded-full flex items-center justify-center text-2xl mr-4 overflow-hidden border-2 border-white/20 cursor-pointer shadow-lg" onclick="openFriendProfile()">👤</div>
                        <h2 id="chat-header-name" class="font-black text-lg sm:text-xl text-white truncate cursor-pointer hover:text-neon-cyan transition tracking-wide" onclick="openFriendProfile()">Собеседник</h2>
                    </div>
                    <div class="flex space-x-3">
                        <button onclick="startCall('audio')" class="w-12 h-12 rounded-full bg-white/10 text-green-400 flex items-center justify-center active:scale-90 text-xl transition border border-white/10"><i class="fas fa-phone-alt"></i></button>
                        <button onclick="startCall('video')" class="w-12 h-12 rounded-full bg-white/10 text-orange-400 flex items-center justify-center active:scale-90 text-xl transition border border-white/10"><i class="fas fa-video"></i></button>
                    </div>
                </div>

                <div id="chat-history" class="flex-1 overflow-y-auto p-4 space-y-4 z-10 glass-panel rounded-[2rem] mb-2 flex flex-col">
                    <div class="flex flex-col items-center justify-center my-4">
                        <span class="bg-black/60 border border-white/10 text-neon-cyan text-[10px] px-4 py-2 rounded-full text-center font-bold tracking-widest uppercase shadow-[0_0_10px_rgba(0,243,255,0.2)]">P2P Канал Защищен 🔒</span>
                    </div>
                </div>

                <div class="glass-panel rounded-b-[2rem] p-3 sm:p-4 flex-shrink-0 z-30">
                    <form onsubmit="sendMessage(event)" class="flex items-end space-x-3 max-w-4xl mx-auto">
                        <button type="button" onclick="document.getElementById('file-input').click()" class="glass-input text-stone-300 rounded-[1.2rem] flex items-center justify-center w-14 h-14 flex-shrink-0 transition active:scale-90 text-xl">
                            <i class="fas fa-plus"></i>
                        </button>
                        <input type="file" id="file-input" class="hidden" onchange="sendFile(event)">
                        <textarea id="chat-input" rows="1" placeholder="Написать..." class="flex-1 glass-input rounded-[1.2rem] px-5 py-4 text-base outline-none resize-none max-h-32 min-h-[56px] font-medium"></textarea>
                        <button type="submit" class="bg-gradient-to-tr from-neon-cyan to-blue-600 text-white rounded-[1.2rem] flex items-center justify-center w-14 h-14 shadow-[0_0_15px_rgba(0,243,255,0.4)] flex-shrink-0 active:scale-90 text-xl transition hover:scale-105"><i class="fas fa-paper-plane"></i></button>
                    </form>

            </div>
        </main>

    <!-- МОДАЛКИ (Профиль и Настройки) -->
    <div id="friend-profile-modal" class="ui-layer hidden absolute inset-0 bg-black/80 backdrop-blur-xl flex items-center justify-center z-50 p-4">
        <div class="glass-panel w-full max-w-sm rounded-[2.5rem] p-8 text-center relative animate-pop border-t border-white/20">
            <button onclick="closeFriendProfile()" class="absolute top-6 right-6 w-10 h-10 rounded-full bg-white/10 flex items-center justify-center text-white active:scale-90 transition"><i class="fas fa-times"></i></button>
            <div id="friend-profile-avatar" class="w-36 h-36 mx-auto rounded-full bg-stone-800 flex items-center justify-center text-7xl overflow-hidden border-[4px] border-neon-purple mb-6 text-white shadow-[0_0_30px_rgba(157,0,255,0.4)]">👤</div>
            <h2 id="friend-profile-name" class="text-3xl font-black mb-2 truncate text-white tracking-wide">Имя</h2>
            <div class="mt-4 flex items-center justify-center space-x-3 bg-black/40 py-3 px-5 rounded-2xl mx-auto cursor-pointer hover:bg-black/60 transition border border-white/5" onclick="copyFriendId()">
                <p id="friend-profile-id" class="text-xl font-mono truncate text-neon-cyan font-bold tracking-widest">000000</p>
                <i class="fas fa-copy text-stone-400"></i>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="ui-layer hidden absolute inset-0 bg-black/80 backdrop-blur-xl flex items-end sm:items-center justify-center z-50 p-0 sm:p-4">
        <div class="glass-panel w-full sm:max-w-md rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8 overflow-y-auto max-h-[90vh] animate-pop border-t border-white/20">
            <div class="flex justify-between items-start mb-6">
                <div class="w-10"></div>
                <div class="flex flex-col items-center text-center relative">
                    <div class="absolute inset-0 bg-orange-500 rounded-full filter blur-[40px] opacity-40"></div>
                    <div id="settings-avatar-big" class="relative w-40 h-40 bg-stone-800 rounded-full flex items-center justify-center text-7xl overflow-hidden mb-4 border-[4px] border-white shadow-lg">🐿️</div>
                    <h2 id="settings-name-big" class="text-3xl font-black text-white tracking-wide">Имя</h2>
                </div>
                <button onclick="closeSettings()" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center active:scale-90 text-lg transition"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="space-y-4 mt-8">
                <div class="glass-input p-5 rounded-3xl border border-white/5">
                    <label class="block text-[10px] font-black text-stone-400 uppercase mb-4 tracking-widest">Аватарка</label>
                    <div class="flex justify-between">
                        <button onclick="setAvatar('🐿️')" class="w-14 h-14 text-3xl rounded-2xl bg-white/5 border border-white/10 active:scale-90">🐿️</button>
                        <button onclick="setAvatar('🦊')" class="w-14 h-14 text-3xl rounded-2xl bg-white/5 border border-white/10 active:scale-90">🦊</button>
                        <button onclick="setAvatar('👽')" class="w-14 h-14 text-3xl rounded-2xl bg-white/5 border border-white/10 active:scale-90">👽</button>
                        <div class="relative w-14 h-14 active:scale-90">
                            <input type="file" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onchange="uploadAvatar(event)">
                            <div class="w-full h-full rounded-2xl bg-gradient-to-br from-neon-purple to-neon-cyan flex items-center justify-center text-white text-xl shadow-[0_0_15px_rgba(0,243,255,0.4)]"><i class="fas fa-image"></i></div>
                        </div>
                    </div>
                </div>
                <button onclick="requestNotificationPermission()" class="w-full flex items-center justify-between p-5 glass-input rounded-3xl border border-white/5 active:scale-95 transition">
                    <span class="text-sm font-bold text-white uppercase tracking-wider"><i class="fas fa-bell mr-3 text-neon-cyan"></i> Уведомления</span>
                    <i class="fas fa-chevron-right text-stone-500"></i>
                </button>
                <button onclick="logout()" class="w-full bg-red-500/20 text-red-400 font-bold py-5 rounded-3xl transition border border-red-500/30 text-sm uppercase tracking-widest mt-4 active:scale-95">Выйти из системы</button>
            </div>
        </div>
    </div>

    <!-- ЭКРАН ЗВОНКА -->
    <div id="video-overlay" class="ui-layer hidden fixed inset-0 sm:inset-auto sm:top-4 sm:right-4 p-4 z-50 flex items-center justify-center sm:justify-end bg-black/95 sm:bg-transparent pointer-events-none transition-all duration-300">
        <div id="call-content" class="glass-panel p-4 rounded-[2rem] flex flex-col w-full max-w-sm sm:w-80 border border-white/10 pointer-events-auto transition-all duration-300 shadow-[0_20px_50px_rgba(0,0,0,0.5)] relative">
            <div class="absolute top-5 left-5 z-40"><span id="call-type-badge" class="bg-red-600 text-white text-[10px] px-3 py-1 rounded-full font-bold uppercase tracking-widest animate-pulse">Звонок</span></div>
            <div class="absolute top-4 right-4 z-40 flex space-x-2">
                <button onclick="toggleNativePiP()" class="w-10 h-10 bg-black/60 rounded-full flex items-center justify-center text-white active:scale-90"><i class="fas fa-external-link-alt text-xs"></i></button>
                <button onclick="toggleMinimizeCall()" class="w-10 h-10 bg-black/60 rounded-full flex items-center justify-center text-white active:scale-90"><i class="fas fa-compress-alt text-xs" id="minimize-icon"></i></button>
            </div>

            <div class="relative w-full aspect-[3/4] bg-black rounded-[1.5rem] overflow-hidden mb-4 mt-12 flex items-center justify-center border border-white/5">
                <div id="audio-only-remote" class="hidden flex-col items-center justify-center w-full h-full absolute inset-0 z-10 bg-stone-900">
                    <div id="call-remote-avatar" class="w-28 h-28 bg-stone-800 rounded-full flex items-center justify-center text-6xl overflow-hidden border-[3px] border-neon-cyan animate-pulse">👤</div>
                </div>
                <video id="remote-video" autoplay playsinline class="w-full h-full object-cover hidden"></video>
                <div id="remote-video-loader" class="absolute inset-0 flex flex-col justify-center items-center bg-black/80 z-20">
                    <div class="w-12 h-12 border-4 border-neon-cyan border-t-transparent rounded-full animate-spin mb-3"></div>
                    <span class="text-xs text-neon-cyan font-bold tracking-widest uppercase animate-pulse">Соединение</span>
                </div>
            </div>
            
            <div id="local-video-wrapper" class="relative w-full h-28 bg-black rounded-2xl overflow-hidden mb-4 border border-white/10">
                <video id="local-video" autoplay playsinline muted class="w-full h-full object-cover"></video>
            </div>
            
            <div class="flex space-x-3">
                <button onclick="toggleMic()" id="btn-mic" class="flex-1 bg-white/10 p-4 rounded-2xl text-xl text-white active:scale-95"><i class="fas fa-microphone"></i></button>
                <button onclick="toggleVideo()" id="btn-video" class="flex-1 bg-white/10 p-4 rounded-2xl text-xl text-white active:scale-95"><i class="fas fa-video"></i></button>
                <button onclick="endCall()" class="flex-2 bg-red-600 px-6 py-4 rounded-2xl font-bold w-full text-xl text-white active:scale-95"><i class="fas fa-phone-slash"></i></button>
            </div>
        </div>
    </div>

    <!-- ВХОДЯЩИЙ ЗВОНОК -->
    <div id="incoming-call-modal" class="ui-layer hidden absolute inset-0 bg-black/90 backdrop-blur-xl flex items-center justify-center z-50 p-4">
        <div class="glass-panel rounded-[2.5rem] p-10 w-full max-w-sm text-center animate-pop border-t border-white/20">
            <div class="w-36 h-36 rounded-full flex items-center justify-center mx-auto mb-8 text-6xl relative">
                <div class="absolute inset-0 bg-green-500 rounded-full animate-ping opacity-30" style="animation-duration: 2s;"></div>
                <div id="incoming-call-icon" class="bg-stone-800 w-full h-full rounded-full flex items-center justify-center relative z-10 text-white overflow-hidden border-[4px] border-green-500">👤</div>
            </div>
            <h2 id="incoming-call-title" class="text-[10px] font-black text-green-400 mb-2 uppercase tracking-widest animate-pulse">Входящий вызов</h2>
            <p id="incoming-caller-name" class="text-white text-3xl font-black mb-10 truncate tracking-wide">Имя</p>
            <div class="flex space-x-5">
                <button onclick="answerCall()" class="flex-1 bg-green-500 text-white font-bold py-5 rounded-2xl text-3xl active:scale-90"><i class="fas fa-phone"></i></button>
                <button onclick="rejectCall()" class="flex-1 bg-red-500 text-white font-bold py-5 rounded-2xl text-3xl active:scale-90"><i class="fas fa-times"></i></button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. ОПТИМИЗИРОВАННАЯ АНИМАЦИЯ CANVAS
        // ==========================================
        function initEpicBattle() {
            const canvas = document.getElementById('epic-battle-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let w, h, particles = [], blocks = [], frameCount = 0;
            let lastTime = 0; const FPS = 60; const frameInterval = 1000 / FPS;

            function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
            window.addEventListener('resize', resize); resize();

            function animate(currentTime) {
                requestAnimationFrame(animate);
                if (!lastTime) lastTime = currentTime;
                const deltaTime = currentTime - lastTime;
                if (deltaTime < frameInterval) return;
                lastTime = currentTime - (deltaTime % frameInterval);

                ctx.clearRect(0, 0, w, h);
                frameCount++;

                let heroX = w * 0.85; let heroY = h * 0.5 + Math.sin(frameCount * 0.05) * 10;
                ctx.font = '80px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('🐿️', heroX, heroY);

                if (frameCount % 60 === 0) blocks.push({ x: -100, y: heroY + (Math.random()*120 - 60), speed: 5 + Math.random()*3, size: 45, destroyed: false });
                let isHitting = blocks.some(b => !b.destroyed && b.x > heroX - 140 && b.x < heroX);
                let swordSwing = isHitting ? Math.sin(frameCount * 0.8) * 2.5 : 0;

                for (let i = blocks.length - 1; i >= 0; i--) {
                    let b = blocks[i]; b.x += b.speed;
                    if (!b.destroyed && b.x > heroX - 110 && b.x < heroX) {
                        b.destroyed = true;
                        for(let j=0; j<15; j++) particles.push({ x: b.x, y: b.y, vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15, life: 1 });
                    }
                    if (!b.destroyed) {
                        ctx.fillStyle = '#dc2626'; ctx.fillRect(b.x - b.size/2, b.y - b.size/2, b.size, b.size);
                        ctx.fillStyle = 'white'; ctx.font = 'bold 14px Arial'; ctx.fillText('РКН', b.x, b.y);
                    } else { blocks.splice(i, 1); }
                }

                for (let i = particles.length - 1; i >= 0; i--) {
                    let p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.04;
                    if (p.life > 0) { ctx.fillStyle = `rgba(0, 255, 255, ${p.life})`; ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill(); } 
                    else { particles.splice(i, 1); }
                }

                ctx.save(); ctx.translate(heroX - 35, heroY + 10); ctx.rotate(-Math.PI/4 + swordSwing);
                ctx.fillStyle = '#0ff'; ctx.fillRect(-4, -90, 8, 90);
                ctx.fillStyle = '#555'; ctx.fillRect(-6, 0, 12, 18); ctx.restore();
            }
            requestAnimationFrame(animate);
        }

        function initPeer() {
            if (typeof Peer === 'undefined') { showToast('Ошибка: PeerJS не загружена', 'error'); return; }
            
            let myId = userProfile.peerId;
            document.getElementById('my-id').value = myId;
            setStatus('Подключение...', 'text-yellow-400');

            try {
                // Стандартное и самое надежное подключение с TURN серверами
                peer = new Peer(myId, { 
                    debug: 2, 
                    pingInterval: 10000,
                    config: { 
                        iceServers: [
                            { urls: 'stun:stun.l.google.com:19302' }, 
                            { urls: 'stun:stun1.l.google.com:19302' },
                            { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
                            { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
                            { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
                        ] 
                    }
                });
            } catch(e) { showToast('Сбой сети', 'error'); return; }
            
            peer.on('open', (id) => { 
                document.getElementById('my-id').value = id; 
                setStatus('Online', 'text-neon-cyan'); 
            });
            
            peer.on('disconnected', () => { 
                setStatus('Сбой сети...', 'text-red-500'); 
                if (!peer.destroyed) setTimeout(() => { setStatus('Подключение...', 'text-yellow-400'); peer.reconnect(); }, 2000); 
            });
            
            peer.on('error', (err) => {
                console.error("Peer error:", err);
                if (err.type === 'peer-unavailable') {
                    showToast('Собеседник оффлайн', 'error');
                    setStatus('Online', 'text-neon-cyan');
                } else if (err.type === 'network' || err.type === 'server-error' || err.type === 'browser-incompatible') {
                    setStatus('Ошибка сервера', 'text-red-500');
                } else if (err.type === 'unavailable-id') {
                    // Если наш случайный 6-значный код вдруг занят кем-то другим в мире - создаем новый!
                    userProfile.peerId = generateCode();
                    saveProfile();
                    peer.destroy();
                    initPeer();
                }
            });
            
            peer.on('connection', (incomingConn) => {
                incomingConn.on('open', () => { incomingConn.send({ type: 'system_sync', name: userProfile.username, avatar: userProfile.avatar }); });
                incomingConn.on('data', (d) => {
                    if (d.type === 'system_sync') { 
                        addOrUpdateFriend(incomingConn.peer, d.name, d.avatar); 
                        if (currentChatFriendId === incomingConn.peer) { document.getElementById('chat-header-name').innerText = d.name; document.getElementById('chat-header-avatar').innerHTML = formatAvatarHTML(d.avatar); }
                    }
                    else if (d.type === 'text' || d.type === 'file') {
                        let textToSave = d.type === 'file' ? `📁 ${d.file.fileName}` : d.text;
                        if (!chatHistories[incomingConn.peer]) chatHistories[incomingConn.peer] = [];
                        chatHistories[incomingConn.peer].push({ text: textToSave, sender: 'them', timestamp: Date.now(), file: d.file }); saveHistories();
                        
                        if (currentChatFriendId === incomingConn.peer) renderMessageUI(textToSave, 'them', new Date(), d.file);
                        else showToast(`Новое сообщение от ${d.senderName || 'друга'}`);
                        
                        playMessageSound(); 
                        try { if (Notification.permission === "granted" && document.hidden) new Notification(userProfile.friends.find(f => f.id === incomingConn.peer)?.name || 'Сообщение', { body: textToSave, icon: '🐿️' }); } catch(e){}
                    }
                });
            });

            peer.on('call', (c) => {
                incomingCallRef = c; currentCallType = c.metadata?.type || 'video'; const f = userProfile.friends.find(f => f.id === c.peer);
                document.getElementById('incoming-caller-name').innerText = f ? f.name : 'Контакт'; document.getElementById('incoming-call-icon').innerHTML = formatAvatarHTML(f ? f.avatar : '👤');

        function sendFile(e) {

                const fileObj = { fileName: file.name, fileType: file.type, data: ev.target.result };

                    dataConnection.send({ type: 'file', file: fileObj, senderName: userProfile.username });

        async function getMediaAccess(type) {
            try { 
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) { showToast('Камера не поддерживается', 'error'); return false; }
                if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; } 
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: type === 'video' ? { facingMode: "user" } : false }); 
                document.getElementById('local-video').srcObject = localStream; return true; 
            } catch (err) { showToast('Доступ к камере запрещен', 'error'); return false; }

        async function answerCall() { 
            try{ringtoneAudio.pause();}catch(e){} 
            document.getElementById('incoming-call-modal').classList.add('hidden'); 
            if (!(await getMediaAccess(currentCallType))) { if (incomingCallRef) incomingCallRef.close(); return; } 
            if (incomingCallRef) { 
                currentChatFriendId = incomingCallRef.peer; 
                setCallUI(currentCallType); 
                incomingCallRef.answer(localStream); 
                setupMediaConnection(incomingCallRef); 
                incomingCallRef = null;

            if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; document.getElementById('local-video').srcObject = null; }

        function endCall() { if (mediaConnection) mediaConnection.close(); endCallLocally(); }

        function toggleMinimizeCall() {
            const overlay = document.getElementById('video-overlay'); const content = document.getElementById('call-content'); const icon = document.getElementById('minimize-icon');
            if (overlay.classList.contains('minimized-call')) { overlay.classList.remove('minimized-call', 'top-auto', 'left-auto', 'bottom-4', 'right-4', 'p-0', 'w-56'); overlay.classList.add('inset-0', 'sm:inset-auto', 'sm:top-4', 'sm:right-4', 'p-4', 'bg-black/90', 'sm:bg-transparent'); content.classList.add('w-full', 'max-w-sm', 'sm:w-80'); icon.className = 'fas fa-compress-alt text-xs'; } 
            else { overlay.classList.add('minimized-call', 'top-auto', 'left-auto', 'bottom-4', 'right-4', 'p-0', 'w-56'); overlay.classList.remove('inset-0', 'sm:inset-auto', 'sm:top-4', 'sm:right-4', 'p-4', 'bg-black/90', 'sm:bg-transparent'); content.classList.remove('w-full', 'max-w-sm', 'sm:w-80'); icon.className = 'fas fa-expand-alt text-xs'; }
        }
        async function toggleNativePiP() { const v = document.getElementById('remote-video'); try { if (document.pictureInPictureElement) { await document.exitPictureInPicture(); } else if (document.pictureInPictureEnabled && !v.hidden) { await v.requestPictureInPicture(); } else { showToast('Видео не активно', 'error'); } } catch(e){} }

        function toggleMic() { if(!localStream) return; micEnabled = !micEnabled; localStream.getAudioTracks().forEach(t => t.enabled = micEnabled); document.getElementById('btn-mic').className = `flex-1 bg-white/10 hover:bg-white/20 p-4 rounded-2xl text-xl transition active:scale-95 ${micEnabled ? 'text-white' : 'text-red-500 shadow-[0_0_10px_rgba(220,38,38,0.5)]'}`; }
        function toggleVideo() { if(!localStream || currentCallType === 'audio') return; videoEnabled = !videoEnabled; localStream.getVideoTracks().forEach(t => t.enabled = videoEnabled); document.getElementById('btn-video').className = `flex-1 bg-white/10 hover:bg-white/20 p-4 rounded-2xl text-xl transition active:scale-95 ${videoEnabled ? 'text-white' : 'text-red-500 shadow-[0_0_10px_rgba(220,38,38,0.5)]'}`; }

        if (ui.chatInput) {
            ui.chatInput.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px'; });
            ui.chatInput.addEventListener('keydown', function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); document.getElementById('chat-form').dispatchEvent(new Event('submit')); } });
        }
        
        checkAuth();
    </script>
</body>
</html>
